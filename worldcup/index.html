<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>توقّع كأس العالم ٢٠٢٦</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="sLogin">
  <div class="hero">
    <div class="logo">🏆 توقّع كأس العالم</div>
    <div class="tagline">٢٠٢٦ • توقّع النتائج واكسب النقاط ونافِس أصحابك</div>
  </div>
  <div class="box">
    <div class="box-title">👤 اكتب اسمك للدخول</div>
    <input class="field" id="nameInput" placeholder="اسمك..." maxlength="20" autocomplete="off">
    <button class="btn btn-gold" id="btnLogin">دخول 🚀</button>
    <div class="err" id="loginErr"></div>
  </div>
  <div class="box" id="playersBox" style="display:none">
    <div class="box-title">🧑‍🤝‍🧑 اللاعبون</div>
    <div id="playersList" class="players-list"></div>
  </div>
</div>

<!-- APP -->
<div class="screen" id="sApp">
  <div class="topbar">
    <div class="brand">🏆 كأس العالم ٢٠٢٦</div>
    <div class="me-chip" id="meChip">👤 —</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="matches">⚽ المباريات</button>
    <button class="tab" data-tab="board">🏅 الترتيب</button>
    <button class="tab" data-tab="admin">⚙️ الإدارة</button>
  </div>

  <!-- MATCHES VIEW -->
  <div class="view active" id="vMatches">
    <div class="rules">
      🎯 نتيجة مطابقة = <b>5</b> نقاط • فوز/تعادل صحيح = <b>2</b> نقطة
    </div>
    <div class="filter-row" id="stageFilter"></div>
    <div id="matchesList"></div>
  </div>

  <!-- BOARD VIEW -->
  <div class="view" id="vBoard">
    <div class="board-head">🏅 ترتيب اللاعبين</div>
    <div id="boardList"></div>
    <div class="board-note" id="boardNote"></div>
  </div>

  <!-- ADMIN VIEW -->
  <div class="view" id="vAdmin">
    <div class="rules">⚙️ أدخل نتائج المباريات بعد انتهائها، وأضِف أو عدّل المباريات.</div>
    <button class="btn btn-gold" id="btnAddMatch">＋ أضف مباراة</button>
    <div id="adminList"></div>
  </div>
</div>

<!-- MATCH MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">＋ أضف مباراة</div>
      <button class="modal-close" id="btnModalClose">✕</button>
    </div>
    <label>الفريق الأول</label>
    <select class="field" id="mHome"></select>
    <label>الفريق الثاني</label>
    <select class="field" id="mAway"></select>
    <div class="grid2">
      <div>
        <label>المرحلة / المجموعة</label>
        <input class="field" id="mGroup" placeholder="مثال: المجموعة A" autocomplete="off">
      </div>
      <div>
        <label>التاريخ والوقت</label>
        <input class="field" id="mDate" type="datetime-local">
      </div>
    </div>
    <label>الملعب (اختياري)</label>
    <input class="field" id="mStadium" placeholder="اسم الملعب" autocomplete="off">
    <button class="btn btn-gold" id="btnSaveMatch" style="margin-top:14px">حفظ المباراة ⚽</button>
    <div class="modal-msg" id="modalMsg"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
